<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><title>小窝核心</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="viewer-overlay" onclick="closeViewer()">
        <img id="viewer-img" src="">
        <button class="btn" id="download-btn">📥 下载</button>
    </div>
    <div class="container">
        <div id="main-page" class="card hidden">
            <div class="timer-box">
                <div style="font-size:0.8rem; color:#888">我们已经在一起</div>
                <div id="love-timer" class="timer-num"></div>
            </div>
            <h2 id="welcome-msg"></h2>
            <div class="menu-grid">
                <div class="menu-item" id="btn-album">📷 相册</div>
                <div class="menu-item" id="btn-memo">📖 回忆录</div>
                <div class="menu-item" id="btn-mood">✍️ 记心情</div>
                <div class="menu-item" id="btn-miss">❤️ 想你了</div>
            </div>
        </div>
        <div id="content-page" class="card hidden">
            <div id="page-detail"></div>
            <button class="btn" id="btn-back">⬅️ 返回</button>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
